name: Deploy Placement Tracker

on:
  push:
    branches:
      - master  # Only deploys when you push to the master branch

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Deploy to EC2 via SSH
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USERNAME }}
          key: ${{ secrets.EC2_SSH_KEY }}
          port: ${{ secrets.EC2_PORT }}
          script: |
            # 1. Enter the project directory
            cd ~/placement-tracker
            
            # 2. Pull the latest code from GitHub
            git pull origin master
            
            # 3. Update Backend
            npm install
            pm2 restart backend
            
            # 4. Update Frontend (The "Baking" Step)
            # We pass the relative path directly to the build command
            REACT_APP_API_URL=/api npm run build
            
            # 5. Refresh Nginx to serve the new build files
            sudo systemctl restart nginx